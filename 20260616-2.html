<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOD TRAVEL</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/my.css">
    <style>

        @media screen and (max-width: 768px) {

            .table-rwb thead,
            caption {
                display: none;
            }

            .table-rwb tbody tr {
                display: block;
                margin-top: 15px;
                border: 2px solid #5dade2;
                border-radius: 5px;
                padding: 10px;
            }

            .table-rwb tbody tr td {
                display: flex;
                align-items: center;
                padding: 8px 0;
                border-bottom: 1px solid #ddd;
            }

            .table-rwb tbody tr td::before {
                content: attr(data-xxx) "：";
                font-size: 15px;
                font-weight: bold;
                color: #004d99;
                flex: 1;
                text-align: right;
                margin-right: 10px;
            }

            .table-rwb tbody tr td span {
                flex: 2;
                text-align: left;
            }
        }

        .erp-table th {
            background-color: #2c3e50;
            color: #ecf0f1;
            text-align: center;
        }

        .erp-table td {
            background-color: #f8f9fa;
            /* text-align: center; */
        }

        .erp-table tr:hover td {
            background-color: #d6eaf8;
        }

        .erp-highlight {
            font-weight: bold;
            color: #2980b9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="display-4 text-center">餐廳列表</div>

        <table class="table mt-3 table-bordered table-hover table-rwb erp-table">
            <caption>表1.2 餐廳列表</caption>
            <thead>
                <tr>
                    <th width="5%">編號</th>
                    <th width="5%">名稱</th>
                    <th width="5%">城市</th>
                    <th width="5%">地址</th>
                    <th width="5%">電話</th>
                    <th width="5%">Email</th>
                    <th width="65%">簡介</th>
                    <th width="5%">圖片</th>
                </tr>
            </thead>
            <tbody id="mybody">
                <tr>
                    <td data-xxx="編號"><span>xxx</span></td>
                    <td data-xxx="名稱"><span class="erp-highlight">xxxx</span></td>
                    <td data-xxx="城市"><span>xxx</span></td>
                    <td data-xxx="地址"><span>xxx</span></td>
                    <td data-xxx="電話"><span>xxx</span></td>
                    <td data-xxx="Email"><span>xxx</span></td>
                    <td data-xxx="簡介"><span>xxx</span></td>
                    <td data-xxx="圖片"><span>xxx</span></td>
                </tr>

            </tbody>
        </table>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script>
        $(function () {
            // 載入資料
            $.ajax({
                type: "GET",
                url: "https://data.moa.gov.tw/Service/OpenData/ODwsv/ODwsvTravelFood.aspx?IsTransData=1&UnitId=193",
                dataType: "json",
                success: function (data) {
                    console.log(data);
                    //資料清洗
                    const cleanData = data.map(function (item, index) {
                        //名稱
                        let name = (item.Name ?? "").trim();
                        if (name == "") {
                            name = "未提供";
                        }
                        //城市
                        let city = (item.City ?? "").trim();
                        if (city == "") {
                            city = "未提供";
                        }
                        //地址
                        let address = (item.Address ?? "").trim();
                        if (address == "") {
                            addresss = "未提供";
                        }
                        //電話
                        let tel = (item.Tel ?? "").trim();
                        if (tel == "") {
                            tel = "未提供";
                        }
                        //Email
                        let email = (item.Email ?? "").trim();
                        if (email == "") {
                            email = "未提供";
                        }
                        //簡介
                        let descr = (item.FoodFeature ?? "").trim();
                        if (descr == "") {
                            descr = "未提供";
                        }
                        //圖片
                        let pic = (item.PicURL ?? "").trim();
                        if (pic == "") {
                            pic = "未提供";
                        }

                        return {
                            id: index + 1,
                            name: name,
                            city: city,
                            address: address,
                            tel: tel,
                            email: email,
                            descr: descr,
                            pic: pic
                        }
                    });

                    console.log("清洗後的資料", cleanData);

                    $("#mybody").empty(); //將第一列範例資料刪掉
                                // 將資料渲染至table #mybody
                    cleanData.forEach(function (item) {
                        let strHTML = `<tr>
                    <td data-xxx="編號"><span>${item.id}</span></td>
                    <td data-xxx="名稱"><span class="erp-highlight">${item.name}</span></td>
                    <td data-xxx="城市"><span>${item.city}</span></td>
                    <td data-xxx="地址"><span>${item.address}</span></td>
                    <td data-xxx="電話"><span>${item.tel}</span></td>
                    <td data-xxx="Email"><span>${item.email}</span></td>
                    <td data-xxx="簡介" ><span>${item.descr}</span></td>
                    <td data-xxx="圖片"><span><img src="${item.pic}" width="200px" alt=""></span></td>
                </tr>`;
                        $('#mybody').append(strHTML);

                    });
                },
                error: function (err) {
                    console.log(err);
                }

            });
        });

    </script>

</body>

</html>
