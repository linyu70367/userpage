    <style>
        @media screen and (max-width: 768px) {

            .table-rwb thead,
            caption {
                display: none;
            }

            .table-rwb tbody tr {
                display: block;
                margin-top: 15px;
                border: 2px solid #5dade2;
                border-radius: 5px;
                padding: 10px;
            }

            .table-rwb tbody tr td {
                display: flex;
                align-items: center;
                padding: 8px 0;
                border-bottom: 1px solid #ddd;
            }

            .table-rwb tbody tr td::before {
                content: attr(data-xxx) "：";
                font-size: 15px;
                font-weight: bold;
                color: #004d99;
                flex: 1;
                text-align: right;
                margin-right: 10px;
            }

            .table-rwb tbody tr td span {
                flex: 2;
                text-align: left;
            }
        }

        .erp-table th {
            background-color: #2c3e50;
            color: #ecf0f1;
            text-align: center;
        }

        .erp-table td {
            background-color: #f8f9fa;
            text-align: center;
        }

        .erp-table tr:hover td {
            background-color: #d6eaf8;
        }

        .erp-highlight {
            font-weight: bold;
            color: #2980b9;
        }
    </style>
</head>

                Name: item.Name.trim(),
                City: city,
                Town: town,
                Tel: (item.Tel ?? "未提供").trim(),
