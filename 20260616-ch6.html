<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ch6 boopstrap欄列切版</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/my.css">
    <style>
        .box01 {
            height: 150px;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            /* 水平置中 */
            align-items: center;
            /* 垂直置中 */
        }

        .box02 {
            height: 150px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="display-3 fw-900 text-primary">1.基本排版</div>
        <div class="row">
            <!-- row底下的col加起來等於12就可以達成完美的排版 -->
            <div class="col-5">
                <div class="box01 bg-info">1基本排版 col-5</div>
            </div>
            <div class="col-7">
                <div class="box01 bg-info">col-7</div>
            </div>
        </div>
        <!-- .row>.col-4*6>.box01.bg-success -->
        <!-- 螢幕越小，排版越少 -->
        <!-- sm>=576,md>=768,lg>=992,xl>=1200,xxl>=1400 -->
        <div class="row">
            <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 col-xxl-2">
                <div class="box01 bg-success">2響應式設計</div>
            </div>
            <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 col-xxl-2 d-md-none d-xl-block">
                <!-- d-md-none d-xl-block 當>=768消失，>=1200再出現-->
                <div class="box01 bg-danger">D-none D-block 練習</div>
            </div>
            <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 col-xxl-2">
                <div class="box01 bg-success"></div>
            </div>
            <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 col-xxl-2">
                <div class="box01 bg-success"></div>
            </div>
            <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 col-xxl-2">
                <div class="box01 bg-success"></div>
            </div>
            <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 col-xxl-2">
                <div class="box01 bg-success"></div>
            </div>
            <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 col-xxl-2">
                <div class="box01 bg-success"></div>
            </div>
            <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 col-xxl-2">
                <div class="box01 bg-success"></div>
            </div>
            <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 col-xxl-2">
                <div class="box01 bg-success"></div>
            </div>
        </div>

        <div class="display-3 fw-900 text-primary">2.推格子offset</div>
        <div class="row">
            <div class="col-6 offset-lg-2">
                <!-- lg>=992才開始推格子 -->
                <div class="box01 bg-warning"></div>
            </div>
            <div class="col-6 offset-lg-4">
                <div class="box01 bg-warning"></div>
            </div>
            <div class="col-6 offset-lg-6">
                <div class="box01 bg-warning"></div>
            </div>
        </div>

        <div class="display-3 fw-900 text-primary">3.Gutter(g-0~5,gx-0~5,gy-0~5)</div>
        <div class="row g-sm-3">
            <div class="col-4">
                <div class="box02 bg-danger"></div>
            </div>
            <div class="col-4">
                <div class="box02 bg-danger"></div>
            </div>
            <div class="col-4">
                <div class="box02 bg-danger"></div>
            </div>
            <div class="col-4">
                <div class="box02 bg-danger"></div>
            </div>
            <div class="col-4">
                <div class="box02 bg-danger"></div>
            </div>
            <div class="col-4">
                <div class="box02 bg-danger"></div>
            </div>
        </div>

    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
