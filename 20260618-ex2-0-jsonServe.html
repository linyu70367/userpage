<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0618練習+json-serve</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/my.css">
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        .header {
            height: 160px;
            background-image: url(images/bus01.avif);
            background-position: center center;
            background-size: cover;
            
        }

        .navBox {
            height: 90px;
            margin-top: 15px;
            font-size: 48px;
            text-align: center;
            line-height: 90px;
            font-weight: 900;
            color: aliceblue;
        }

        .contentBox {
            position: relative;
            overflow: hidden;

            margin-top: 15px;

            background: #fffdf8;

            border-radius: 20px;

            border: 1px solid #f3e6d8;

            box-shadow:
                0 8px 20px rgba(0, 0, 0, .08);

            transition: all .3s ease;
        }

        .contentBox:hover {
            transform: translateY(-8px);

            box-shadow:
                0 16px 35px rgba(0, 0, 0, .15);
        }

        .roller_box{
            z-index: 999;
        }

        .roller_box .btn {
            background-color: #d97706;
            border: none;

            padding: 0;

            border-radius: 50px;

            overflow: hidden;

            box-shadow:
                0 4px 12px rgba(217, 119, 6, .35);

            transition: all .3s ease;
        }

        .roller_box .btn:hover {
            background-color: #b45309;

            transform: translateY(-2px);

            box-shadow:
                0 8px 20px rgba(180, 83, 9, .45);
        }

        .roller_box .btn a {
            display: block;

            padding: .7rem 1.8rem;

            color: #fff;

            text-decoration: none;

            font-weight: 700;

            letter-spacing: 1px;
        }

        .roller_box .btn a:hover {
            color: #fff;
        }

        .roller_box .btn a:visited {
            color: #fff;
        }

        .contentBox img {
            width: 100%;
            height: 260px;

            object-fit: cover;

            transition: transform .5s;
        }

        .contentBox:hover img {
            transform: scale(1.05);
        }

        .contentBox .card-body {
            padding: 1.5rem;
        }

        .contentBox .restaurant-title {
            color: #6b3e26;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .contentBox .restaurant-info {
            color: #6c757d;
            font-size: .95rem;
        }

        .contentBox .restaurant-info i {
            width: 20px;
            color: #d97706;
        }

        .contentBox .restaurant-desc {
            color: #495057;

            line-height: 1.8;

            margin-top: 1rem;

            display: -webkit-box;
            -webkit-line-clamp: 4;
            line-clamp: 4;
            -webkit-box-orient: vertical;

            overflow: hidden;
        }

        .contentBox::after {
            content: "";

            position: absolute;

            left: 0;
            right: 0;
            bottom: 0;

            height: 5px;

            background: linear-gradient(90deg,
                    #d97706,
                    #f59e0b);
        }

        /*跟AI說除非bootsrtap沒有的功能，才可以寫在@media*/
        @media screen and (min-width: 768px) {
            .navBox {
                height: 180px;
                line-height: 180px;
            }

        }

        @media screen and (min-width:992px) {
            .navBox {
                width: 180px;
                border-radius: 50%;
            }
        }

        @media screen and (min-width:1200px) {
            .navBox {
                width: 220px;
                height: 220px;
                line-height: 220px;
                border-radius: 50%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-12 d-none d-sm-block">
                <div class="header"></div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-6 col-md-3">
                <div class="navBox bg-success">選單01</div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="navBox bg-success">選單02</div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="navBox bg-success">選單03</div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="navBox bg-success">選單04</div>
            </div>
        </div>
        <div class="row" id="newbox">
            <!-- /*這邊的id是用來渲染*/ -->
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="contentBox card border-0 roller-b">

                    <div class="roller_box">
                        <button class="btn btn-light shadow-sm">
                            <a href="#">
                                查看更多
                            </a>
                        </button>
                    </div>

                    <img src="images/restaurant01.jpg" class="card-img-top" alt="餐廳照片">

                    <div class="card-body">

                        <h3 class="restaurant-title mb-3 text-truncate">
                            森林食光餐廳
                        </h3>

                        <div class="restaurant-info mb-2">
                            <i class="fa-solid fa-location-dot me-2"></i>
                            台中市西屯區台灣大道三段100號
                        </div>

                        <div class="restaurant-info mb-3">
                            <i class="fa-solid fa-phone me-2"></i>
                            (04)1234-5678
                        </div>

                        <div class="restaurant-desc">
                            提供義大利麵、燉飯與手工甜點，
                            採用新鮮食材現點現做。
                            舒適溫馨的用餐空間，
                            適合家庭聚餐、朋友聚會與情侶約會。
                        </div>

                    </div>

                </div>

            </div>




        </div>
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/jquery-4.0.0.js"></script>
        <script>
            $(function () {
                $.ajax({
                    type: "GET",
                    url: "https://data.moa.gov.tw/Service/OpenData/ODwsv/ODwsvTravelFood.aspx?IsTransData=1&UnitId=193",
                    dataType: "json",
                    success: function (data) {
                        // console.log(data);
                        //幫我重新設計contentBox，我要擺入的資料包含餐廳圖片，名稱，地址，簡介(大概100字)，超連結(roller_box btn)，盡量使用bootstrap功能
                        //1. 清洗資料，保留需要用到的欄位
                        //2. 將清洗的資料渲染到AI生成的contentBox

                        const cleanData = data.map(function (item, index) {
                            let name = (item.Name ?? "").trim();
                            if (name == "") {
                                name = "未提供";
                            }
                            let a = (item.Address ?? "").trim();
                            if (a == "") {
                                a = "未提供";
                            }
                            let c = (item.City ?? "").trim();
                            if (c == "") {
                                c = "";
                            }
                            let t = (item.Town ?? "").trim();
                            if (t == "") {
                                t = "";
                            }
                            let tel = (item.Tel ?? "").trim();
                            if (tel == "") {
                                tel = "未提供";
                            }
                            let info = (item.HostWords ?? "").trim();
                            if (info == "") {
                                info = "未提供";
                            }
                            let picUrl = (item.PicURL ?? "").trim();
                            if (picUrl == "") {
                                picUrl = "未提供";
                            }
                            let url = (item.Url ?? "").trim();
                            if (url == "") {
                                url = "未提供";
                            }
                            return {
                                id: index + 1,
                                name: name,
                                address: c + t + a,
                                tel: tel,
                                info: info,
                                pic: picUrl,
                                url: url
                            }

                        });
                        // console.log(cleanData);


                        // 先清空範例文字
                        $("#newbox").empty();
                        // 開始渲染
                        cleanData.forEach(function (item) {
                            let strHtml = `<div class="col-md-6 col-lg-4 mb-4">
                                <div class="contentBox card border-0 roller-b">
                    <div class="roller_box">
                        <button class="btn btn-light shadow-sm">
                            <a href="${item.url}">
                                查看更多
                            </a>
                        </button>
                    </div>

                    <img src="${item.pic}" class="card-img-top" alt="餐廳照片">
                    <div class="card-body">
                        <h3 class="restaurant-title mb-3 text-truncate">
                            ${item.name}
                        </h3>
                        <div class="restaurant-info mb-2">
                            <i class="fa-solid fa-location-dot me-2"></i>
                            ${item.address}
                        </div>
                        <div class="restaurant-info mb-3">
                            <i class="fa-solid fa-phone me-2"></i>
                            ${item.tel}
                        </div>
                        <div class="restaurant-desc">
                            ${item.info}
                        </div></div></div></div>`
                            $("#newbox").append(strHtml);

                        });


                    },
                    error: function (err) {
                        console.log(err);
                    }
                });
            });
        </script>
</body>

</html>
