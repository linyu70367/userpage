<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練習2</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        .box {
            height: 150px;
            margin-top: 15px;
            text-align: center;
            line-height: 150px;
            /* 垂直置中 */
            font-weight: 900;
        }

        .roller {
            position: relative;
            overflow: hidden; /*最後再加入，避免看不到*/
        }

        .roller .roller_box {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            bottom:  -100%;
            /*將roller_box的內容置中*/
            display: flex;
            align-items: center;
            justify-content: center;
            transition: bottom 1s;
        }

        .roller:hover .roller_box {
            bottom: 0;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="row">
            <div class="col-xxl-2 col-lg-4 col-sm-6 display-3">
                <div class="box bg-warning roller">
                    123456798
                    <div class="roller_box">
                        <button class="btn btn-primary">查看</button>
                    </div>
                </div>
            </div>
            <div class="col-xxl-2 col-lg-4 col-sm-6 display-3">
                <div class="box bg-warning">02</div>
            </div>
            <div class="col-xxl-2 col-lg-4 col-sm-6 display-3">
                <div class="box bg-warning">03</div>
            </div>
            <div class="col-xxl-2 col-lg-4 col-sm-6 display-3">
                <div class="box bg-warning">04</div>
            </div>
            <div class="col-xxl-2 col-lg-4 col-sm-6 display-3">
                <div class="box bg-warning">05</div>
            </div>
            <div class="col-xxl-2 col-lg-4 col-sm-6 display-3">
                <div class="box bg-warning">06</div>
            </div>
        </div>

    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
