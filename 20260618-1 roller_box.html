<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>roller_box</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        .box {
            height: 150px;
            margin-top: 15px;

            /*水平置中*/
            text-align: center;
            /* 垂直置中 */
            line-height: 150px;

            font-weight: 900;
        }

        /*由下而上*/
        .roller-b {
            position: relative;
            /*隱藏溢位*/
            overflow: hidden;
        }

        .roller-b .roller_box {
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: -100%;

            /*將roller_box的內容置中*/
            display: flex;
            align-items: center;
            justify-content: center;

            transition: bottom 1s;

            /* 玻璃質感 */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);

            /* 玻璃邊框 */
            border: 1px solid rgba(255, 255, 255, 0.3);

            /* 高光 */
            box-shadow:
                inset 0 1px 1px rgba(255, 255, 255, 0.4),
                0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .roller-b:hover .roller_box {
            bottom: 0;
        }


        /*由上而下*/
        .roller-t {
            position: relative;
            /*隱藏溢位*/
            overflow: hidden;
        }

        .roller-t .roller_box {
            position: absolute;
            width: 100%;
            height: 100%;
            top: -100%;

            /*將roller_box的內容置中*/
            display: flex;
            align-items: center;
            justify-content: center;

            transition: top 1s;

            /* 玻璃質感 */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);

            /* 玻璃邊框 */
            border: 1px solid rgba(255, 255, 255, 0.3);

            /* 高光 */
            box-shadow:
                inset 0 1px 1px rgba(255, 255, 255, 0.4),
                0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .roller-t:hover .roller_box {
            top: 0;
        }

        /*由左而右*/
        .roller-l {
            position: relative;
            /*隱藏溢位*/
            overflow: hidden;
        }

        .roller-l .roller_box {
            position: absolute;
            width: 100%;
            height: 100%;
            left: -100%;
            bottom: 0;

            /*將roller_box的內容置中*/
            display: flex;
            align-items: center;
            justify-content: center;

            transition: left 1s;

            /* 玻璃質感 */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);

            /* 玻璃邊框 */
            border: 1px solid rgba(255, 255, 255, 0.3);

            /* 高光 */
            box-shadow:
                inset 0 1px 1px rgba(255, 255, 255, 0.4),
                0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .roller-l:hover .roller_box {
            left: 0;
            bottom: 0;
        }


        /*由右而左*/
        .roller-r {
            position: relative;
            /*隱藏溢位*/
            overflow: hidden;
        }

        .roller-r .roller_box {
            position: absolute;
            width: 100%;
            height: 100%;
            right: -100%;
            bottom: 0;

            /*將roller_box的內容置中*/
            display: flex;
            align-items: center;
            justify-content: center;

            transition: right 1s;

            /* 玻璃質感 */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);

            /* 玻璃邊框 */
            border: 1px solid rgba(255, 255, 255, 0.3);

            /* 高光 */
            box-shadow:
                inset 0 1px 1px rgba(255, 255, 255, 0.4),
                0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .roller-r:hover .roller_box {
            right: 0;
            bottom: 0;
        }
    </style>
</head>

<body>


    <div class="row">
        <div class="col-3">
            <div class="box bg-warning roller-b">
                roller-b
                <div class="roller_box">
                    <button class="btn btn-primary">查看</button>
                </div>
            </div>
        </div>

        <div class="col-3">
            <div class="box bg-warning roller-t">
                roller-t
                <div class="roller_box">
                    <button class="btn btn-primary">查看</button>
                </div>
            </div>
        </div>

        <div class="col-3">
            <div class="box bg-warning roller-l">
                roller-l
                <div class="roller_box">
                    <button class="btn btn-primary">查看</button>
                </div>
            </div>
        </div>

        <div class="col-3">
            <div class="box bg-warning roller-r">
                roller-r
                <div class="roller_box">
                    <button class="btn btn-primary">查看</button>
                </div>
            </div>
        </div>


    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
