        const cleanHotel = hotel.map(function (item, index) {
            // 將 台中市 統一修改為 臺中市
            let city = item.City;
            if(city == "台中市"){
                city = "臺中市"
            }
            // 移除前後空白；若沒有資料，顯示 行政區未提供
            let town=(item.Town ?? "行政區未提供").trim();
            if(town == ""){
                town="行政區未提供"
            }

            return{
                id: index + 1,
                Name: item.Name.trim(),
                City: city,
                Town: town,
                Tel: (item.Tel ?? "未提供").trim(),
                RoomType: item.RoomType.trim(),
                Price: Number(item.Price),
                Email: (item.Email ?? "未提供").trim()
            }
        });






        console.log('原本的資料', hotel);
        console.log('資料清洗後的資料', cleanHotel);

        $("#h").empty();
                        // 開始渲染
        hotel.forEach(function (item) {
